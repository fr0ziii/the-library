default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

# playbook: https://github.com/fr0ziii/fff-engineering-playbook
library:
  skills:
    - name: agent-browser
      description: Browser automation CLI for AI agents — navigate pages, fill forms, click buttons, take screenshots, scrape data, and automate any browser task
      source: https://github.com/vercel-labs/agent-browser/blob/main/skills/agent-browser/SKILL.md

    - name: dogfood
      description: Systematically explore and QA a web application to find bugs and UX issues, producing a structured report with screenshots and repro steps
      source: https://github.com/vercel-labs/agent-browser/blob/main/skills/dogfood/SKILL.md
      requires: [skill:agent-browser]
  agents: []
  prompts:
    - name: add-changelog
      description: Generate and maintain project changelog with Keep a Changelog format
      source: https://github.com/fr0ziii/fff-engineering-playbook/blob/main/prompts/add-changelog.md

    - name: spec-init
      description: Write detailed specs by interviewing the user to gather requirements
      source: https://github.com/fr0ziii/fff-engineering-playbook/blob/main/prompts/spec-init.md
